<!DOCTYPE html>
<html>
<head>
    <title>Microproject Submission Portal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <!-- Firebase -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, addDoc, query, where, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCJ7PcLTBZNTm64m9ep8pGP9o0KB6GHWQA",
            authDomain: "submission-portal-689e6.firebaseapp.com",
            projectId: "submission-portal-689e6",
            storageBucket: "submission-portal-689e6.firebasestorage.app",
            messagingSenderId: "608950305112",
            appId: "1:608950305112:web:4e591e1168d7685216a52d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
        window.firestoreModules = { collection, addDoc, query, where, getDocs, deleteDoc, doc };
    </script>
</head>
<body>

<div class="container">
    <h2 class="college-name">CARMEL COLLEGE OF ENGINEERING AND TECHNOLOGY PUNNAPRA, ALAPPUZHA</h2>
    <hr class="divider">
    <h1 class="portal-title">🎨 Microproject Submission Portal 🎨</h1>
    <p class="portal-subtitle">Fill your details and submit your microproject!</p>

    <div class="form-columns">
        <div class="form-column">
            <div class="form-group">
                <label>Student Name</label>
                <input type="text" id="name" placeholder="Enter your name">
            </div>
            <div class="form-group">
                <label>Class</label>
                <select id="class">
                    <option value="">Select Class</option>
                    <option>Ⅰ Year</option>
                    <option>II Year</option>
                    <option>III Year</option>
                    <option>IV Year</option>
                </select>
            </div>
            <div class="form-group">
                <label>Faculty Name</label>
                <input type="text" id="faculty" placeholder="Enter faculty name">
            </div>
            <div class="form-group">
                <label>Upload File</label>
                <input type="file" id="file">

                <!-- FILE COMPRESSOR -->
                <div id="compressorDiv" style="display:none; margin-top:10px;">
                    <label id="compressorLabel">Compress as PDF (KB)</label>
                    <div style="display:flex; gap:8px; align-items:center; flex-wrap:wrap;">
                        <input type="number" id="targetKB" placeholder="Target size in KB" style="width:180px;">
                        <button type="button" onclick="applyCompress()" style="background:#6b5b95; width:auto; padding:8px 14px;">🗜️ Compress</button>
                    </div>
                    <p id="originalSize" style="color:#6b5b95; font-size:12px; margin-top:5px;"></p>
                    <p id="compressStatus" style="color:#ff6f61; font-size:12px;"></p>
                    <div id="compressPreviewBox" style="display:none; margin-top:8px;">
                        <p id="compressedSize" style="color:green; font-size:12px; font-weight:bold;"></p>
                        <img id="previewImg" style="display:none; max-width:100%; border-radius:10px; border:2px solid #ff914d;">
                        <iframe id="previewPdf" style="display:none; width:100%; height:300px; border-radius:10px; border:2px solid #ff914d;" frameborder="0"></iframe>
                        <br>
                        <a id="previewDownload" href="#" download style="display:none; color:#6b5b95; font-weight:bold; font-size:13px;">⬇️ Download Compressed File</a>
                    </div>
                </div>
            </div>
        </div>

        <div class="form-column">
            <div class="form-group">
                <label>Register Number</label>
                <input type="text" id="regno" placeholder="Enter your register number">
            </div>
            <div class="form-group">
                <label>Department</label>
                <select id="dept">
                    <option value="">Select Department</option>
                    <option>CSE</option>
                    <option>CE</option>
                    <option>EEE</option>
                    <option>MECH</option>
                </select>
            </div>
            <div class="form-group">
                <label>Project Title</label>
                <input type="text" id="title" placeholder="Enter project title">
            </div>
            <div class="form-group">
                <label>
                    <input type="checkbox" id="isGroup" onclick="toggleGroupMembers()"> Group Project
                </label>
            </div>
            <div class="form-group" id="groupMembersDiv" style="display:none;">
                <label>Group Members (comma separated)</label>
                <input type="text" id="groupMembers" placeholder="Enter names of group members">
            </div>
            <div class="form-group">
                <button onclick="showMessage()">Submit Project</button>
            </div>
        </div>
    </div>

    <!-- CHECK MY SUBMISSION -->
    <div style="margin-top:20px; border-top:2px dashed #ff914d; padding-top:15px;">
        <p style="color:#6b5b95; font-weight:bold;">📂 Already Submitted? Check Your File</p>
        <div class="form-group">
            <input type="text" id="checkRegno" placeholder="Enter your Register Number">
        </div>
        <div class="form-group">
            <input type="text" id="checkName" placeholder="Enter your Full Name">
        </div>
        <button onclick="checkMySubmission()" style="background:#6b5b95;">🔍 View My Submission</button>
        <p id="checkError" style="color:red; font-size:13px;"></p>
    </div>
</div>

<footer class="footer">© 2026 Microproject Submission Portal</footer>

<script>
function toggleGroupMembers() {
    var isGroup = document.getElementById("isGroup").checked;
    document.getElementById("groupMembersDiv").style.display = isGroup ? "block" : "none";
}

async function showMessage() {
    var name     = document.getElementById("name").value;
    var regno    = document.getElementById("regno").value;
    var studentClass = document.getElementById("class").value;
    var dept     = document.getElementById("dept").value;
    var faculty  = document.getElementById("faculty").value;
    var title    = document.getElementById("title").value;
    var fileInput = document.getElementById("file");
    var file     = fileInput.files[0];
    var isGroup  = document.getElementById("isGroup").checked;
    var groupMembers = isGroup ? document.getElementById("groupMembers").value : "";

    if (!name || !regno || !studentClass || !dept || !faculty || !title || !file) {
        alert("Please fill all details!");
        return;
    }

    var fileData = window.compressedFileData;
    var fileName = window.compressedFileName || file.name;

    if (!fileData) {
        fileData = await new Promise(function(resolve) {
            var reader = new FileReader();
            reader.onload = function() { resolve(reader.result); };
            reader.readAsDataURL(file);
        });
    }

    try {
        var { collection, addDoc } = window.firestoreModules;
        var db = window.db;

        await addDoc(collection(db, "submissions"), {
            name, regno,
            class: studentClass,
            dept, faculty, title,
            isGroup, groupMembers,
            fileName, fileData,
            status: "pending",
            remark: "",
            timestamp: new Date().toISOString()
        });

        sessionStorage.setItem("currentStudentRegno", regno);
        alert("Project Submitted Successfully!");
        window.location.href = "result.html";
    } catch (err) {
        alert("Submission failed! " + err.message);
    }
}

async function checkMySubmission() {
    var regno = document.getElementById("checkRegno").value.trim();
    var name  = document.getElementById("checkName").value.trim().toLowerCase();

    if (!regno || !name) {
        document.getElementById("checkError").innerText = "❌ Please enter both register number and name!";
        return;
    }

    try {
        var { collection, query, where, getDocs } = window.firestoreModules;
        var db = window.db;

        var q = query(collection(db, "submissions"), where("regno", "==", regno));
        var snapshot = await getDocs(q);

        var found = false;
        snapshot.forEach(function(d) {
            if (d.data().name.toLowerCase() === name) found = true;
        });

        if (!found) {
            document.getElementById("checkError").innerText = "❌ Register number and name do not match!";
            return;
        }

        sessionStorage.setItem("currentStudentRegno", regno);
        window.location.href = "result.html";
    } catch (err) {
        document.getElementById("checkError").innerText = "❌ Error: " + err.message;
    }
}

// ===== COMPRESSOR =====
window.compressedFileData = null;
window.compressedFileName = null;

document.getElementById("file").addEventListener("change", function() {
    var file = this.files[0];
    window.compressedFileData = null;
    window.compressedFileName = null;
    document.getElementById("compressPreviewBox").style.display = "none";
    document.getElementById("compressStatus").innerText = "";

    if (file) {
        document.getElementById("compressorDiv").style.display = "block";
        var originalKB = Math.round(file.size / 1024);
        document.getElementById("originalSize").innerText = "📄 Original: " + originalKB + " KB | " + file.type;
        document.getElementById("compressorLabel").innerText =
            file.type === "application/pdf" ? "📄 Compress PDF (KB)" : "🔄 Convert to PDF & Compress (KB)";
        document.getElementById("targetKB").placeholder = "Target KB (< " + originalKB + ")";
    } else {
        document.getElementById("compressorDiv").style.display = "none";
    }
});

async function applyCompress() {
    var file = document.getElementById("file").files[0];
    if (!file) return;
    var targetKB = parseInt(document.getElementById("targetKB").value);
    var originalKB = Math.round(file.size / 1024);
    if (!targetKB || targetKB <= 0) { alert("Enter valid target KB!"); return; }
    if (targetKB >= originalKB) { alert("Target must be less than " + originalKB + " KB!"); return; }

    document.getElementById("compressStatus").innerText = "⏳ Processing...";
    document.getElementById("compressPreviewBox").style.display = "none";

    try {
        var pdfBytes;
        var newFileName = file.name.replace(/\.[^/.]+$/, "") + ".pdf";

        if (file.type === "application/pdf") {
            var ab = await file.arrayBuffer();
            var pdfDoc = await PDFLib.PDFDocument.load(new Uint8Array(ab), { ignoreEncryption: true });
            pdfDoc.getPages().forEach(function(p) { p.node.normalize(); });
            pdfBytes = await pdfDoc.save({ useObjectStreams: true });

        } else if (file.type.startsWith("image/")) {
            var ab = await file.arrayBuffer();
            var pdfDoc = await PDFLib.PDFDocument.create();
            var imgBytes = new Uint8Array(ab);
            var img = file.type === "image/png"
                ? await pdfDoc.embedPng(imgBytes)
                : await (async function() {
                    var blob = new Blob([ab], { type: file.type });
                    var url = URL.createObjectURL(blob);
                    var imgEl = await new Promise(function(res) {
                        var i = new Image(); i.onload = function() { res(i); }; i.src = url;
                    });
                    var canvas = document.createElement("canvas");
                    canvas.width = imgEl.width; canvas.height = imgEl.height;
                    canvas.getContext("2d").drawImage(imgEl, 0, 0);
                    URL.revokeObjectURL(url);
                    var quality = 0.9;
                    var dataUrl = canvas.toDataURL("image/jpeg", quality);
                    var kb = Math.round((dataUrl.length * 3) / 4 / 1024);
                    while (kb > targetKB && quality > 0.05) {
                        quality -= 0.05;
                        dataUrl = canvas.toDataURL("image/jpeg", quality);
                        kb = Math.round((dataUrl.length * 3) / 4 / 1024);
                    }
                    var jpegBytes = Uint8Array.from(atob(dataUrl.split(",")[1]), function(c) { return c.charCodeAt(0); });
                    return await pdfDoc.embedJpg(jpegBytes);
                })();
            var page = pdfDoc.addPage([img.width, img.height]);
            page.drawImage(img, { x: 0, y: 0, width: img.width, height: img.height });
            pdfBytes = await pdfDoc.save({ useObjectStreams: true });

        } else if (file.type === "text/plain" || file.name.endsWith(".txt")) {
            var text = await file.text();
            var pdfDoc = await PDFLib.PDFDocument.create();
            var font = await pdfDoc.embedFont(PDFLib.StandardFonts.Helvetica);
            var page = pdfDoc.addPage([595, 842]);
            var { width, height } = page.getSize();
            var y = height - 40; var fontSize = 11; var margin = 40;
            var words = text.split(" "); var line = "";
            for (var w of words) {
                var test = line + w + " ";
                if (font.widthOfTextAtSize(test, fontSize) > width - margin * 2 && line) {
                    if (y < 60) { page = pdfDoc.addPage([595, 842]); y = height - 40; }
                    page.drawText(line.trim(), { x: margin, y, size: fontSize, font });
                    line = w + " "; y -= 16;
                } else { line = test; }
            }
            if (line.trim()) page.drawText(line.trim(), { x: margin, y, size: fontSize, font });
            pdfBytes = await pdfDoc.save({ useObjectStreams: true });

        } else {
            document.getElementById("compressStatus").innerText = "⚠️ This file type cannot be converted in browser. Upload PDF, image or text file.";
            return;
        }

        var resultKB = Math.round(pdfBytes.length / 1024);
        var base64 = btoa(new Uint8Array(pdfBytes).reduce(function(d, b) { return d + String.fromCharCode(b); }, ""));
        var dataUrl = "data:application/pdf;base64," + base64;

        window.compressedFileData = dataUrl;
        window.compressedFileName = newFileName;

        document.getElementById("compressStatus").innerText = "";
        document.getElementById("previewImg").style.display = "none";
        document.getElementById("previewPdf").src = dataUrl;
        document.getElementById("previewPdf").style.display = "block";
        var dl = document.getElementById("previewDownload");
        dl.href = dataUrl; dl.download = newFileName; dl.style.display = "inline-block";
        document.getElementById("compressedSize").innerText = "✅ Done: ~" + resultKB + " KB → saved as " + newFileName;
        document.getElementById("compressPreviewBox").style.display = "block";

    } catch (err) {
        document.getElementById("compressStatus").innerText = "❌ Error: " + err.message;
    }
}
</script>
</body>
</html>
