<!DOCTYPE html>
<html>
<head>
    <title>Submission Details</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .status-badge { display:inline-block; padding:6px 18px; border-radius:20px; font-weight:bold; font-size:15px; margin-top:8px; }
        .status-pending  { background:#fff3cd; color:#856404; border:2px solid #ffc107; }
        .status-approved { background:#d4edda; color:#155724; border:2px solid #28a745; }
        .status-rejected { background:#f8d7da; color:#721c24; border:2px solid #dc3545; }
    </style>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, query, where, getDocs, deleteDoc, doc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCJ7PcLTBZNTm64m9ep8pGP9o0KB6GHWQA",
            authDomain: "submission-portal-689e6.firebaseapp.com",
            projectId: "submission-portal-689e6",
            storageBucket: "submission-portal-689e6.firebasestorage.app",
            messagingSenderId: "608950305112",
            appId: "1:608950305112:web:4e591e1168d7685216a52d"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);
        window.db = db;
        window.firestoreModules = { collection, query, where, getDocs, deleteDoc, doc };

        // Load submission
        window.addEventListener("load", async function() {
            var regno = sessionStorage.getItem("currentStudentRegno");
            var content = document.getElementById("resultContent");

            if (!regno) {
                content.innerHTML = "<p style='color:red;'>No submission found. Please go back and submit.</p>";
                return;
            }

            try {
                var q = query(collection(db, "submissions"), where("regno", "==", regno));
                var snapshot = await getDocs(q);

                if (snapshot.empty) {
                    content.innerHTML = "<p style='color:red;'>No submission found for your register number.</p>";
                    return;
                }

                var docId, item;
                snapshot.forEach(function(d) { docId = d.id; item = d.data(); });

                window.currentDocId = docId;

                var status = item.status || "pending";
                var badgeClass = "status-" + status;
                var badgeText = status === "approved" ? "✅ Approved"
                              : status === "rejected" ? "❌ Rejected"
                              : "⏳ Pending Review";

                content.innerHTML = `
                    <p><strong>Student Name:</strong> ${item.name}</p>
                    <p><strong>Register No:</strong> ${item.regno}</p>
                    <p><strong>Class:</strong> ${item.class}</p>
                    <p><strong>Department:</strong> ${item.dept}</p>
                    <p><strong>Faculty:</strong> ${item.faculty}</p>
                    <p><strong>Project Title:</strong> ${item.title}</p>
                    ${item.isGroup ? `<p><strong>Group Members:</strong> ${item.groupMembers}</p>` : ""}
                    <p><strong>📅 Submitted:</strong> ${item.timestamp ? new Date(item.timestamp).toLocaleString() : "N/A"}</p>
                    <p><strong>📋 Status:</strong><br>
                        <span class="status-badge ${badgeClass}">${badgeText}</span>
                    </p>
                    ${item.remark ? `<p><strong>📝 Admin Remark:</strong> ${item.remark}</p>` : ""}
                    <hr>
                    <p><strong>📎 Your Submitted File:</strong></p>
                    ${
                        item.fileData.startsWith("data:image/")
                        ? `<img src="${item.fileData}" style="max-width:100%; border-radius:10px; border:2px solid #ff914d;">`
                        : `<iframe src="${item.fileData}" style="width:100%; height:300px; border-radius:10px; border:2px solid #ff914d;" frameborder="0"></iframe>`
                    }
                    <br><br>
                    <a href="${item.fileData}" download="${item.fileName}"
                        style="background:#ff6f61; color:white; padding:10px 20px; border-radius:15px; text-decoration:none; font-weight:bold;">
                        ⬇️ Download My File
                    </a>
                    <br><br>
                    <button onclick="deleteMySubmission()" style="background:#ff3b2f; max-width:220px;">
                        🗑️ Delete My Submission
                    </button>
                    <p id="deleteMsg" style="color:green; font-size:13px;"></p>
                `;
            } catch (err) {
                content.innerHTML = "<p style='color:red;'>Error loading submission: " + err.message + "</p>";
            }
        });
    </script>
</head>
<body>
<div class="container">
    <h1>Submission Successful 🎉</h1>
    <div id="resultContent"><p>⏳ Loading your submission...</p></div>
    <br>
    <a href="index.html">Go Back</a>
</div>

<script>
async function deleteMySubmission() {
    if (!confirm("Are you sure you want to delete your submission? This cannot be undone!")) return;
    try {
        var { deleteDoc, doc } = window.firestoreModules;
        var db = window.db;
        await deleteDoc(doc(db, "submissions", window.currentDocId));
        sessionStorage.removeItem("currentStudentRegno");
        document.getElementById("deleteMsg").innerText = "✅ Deleted successfully!";
        setTimeout(function() { window.location.href = "index.html"; }, 2000);
    } catch (err) {
        alert("Delete failed: " + err.message);
    }
}
</script>
</body>
</html>
